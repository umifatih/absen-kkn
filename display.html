<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Papan Absen KKN</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  body{
    margin:0;min-height:100vh;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:#1F3A34;color:#F8F4E9;
    font-family:"Segoe UI",system-ui,sans-serif;text-align:center;
  }
  h1{font-family:Georgia,serif;font-weight:400;font-size:26px;margin:0 0 4px;}
  .sub{color:#B7C9BF;font-size:13px;margin-bottom:28px;}
  .qr-box{background:#fff;padding:20px;border-radius:16px;box-shadow:0 8px 30px rgba(0,0,0,.3);}
  .code{
    margin-top:22px;font-size:15px;letter-spacing:.1em;color:#B7C9BF;
  }
  .code b{color:#F8F4E9;font-size:22px;letter-spacing:.2em;}
  .timer{margin-top:10px;font-size:13px;color:#8CA79A;}
</style>
</head>
<body>
  <h1>Scan untuk Absen</h1>
  <div class="sub">Kode berganti otomatis tiap 5 menit</div>
  <div class="qr-box"><div id="qrcode"></div></div>
  <div class="code">Kode saat ini: <b id="code-label">------</b></div>
  <div class="timer" id="timer">Berganti dalam 05:00</div>

<script>
// GANTI dengan URL Web App Apps Script kamu setelah deploy
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxamrdEuciLY9ndEPyL6Wv_D99Zj7AJY2k7Fri5i_JcMHgRb9p9xptJFgyzi3NcEfNe/exec";
// GANTI dengan URL GitHub Pages tempat absen.html kamu di-hosting
const ABSEN_URL = "https://umifatih.github.io/absen-kkn/absen.html";
// Kunci rahasia — HARUS SAMA PERSIS dengan SECRET di Code.gs
const SECRET = "RahasiaSekreKKN47";

const BUCKET_MS = 5 * 60 * 1000;

function bucketFor(ts){ return Math.floor(ts / BUCKET_MS); }
function makeCode(bucket, secret){
  const str = secret + ':' + bucket;
  let hash = 0;
  for(let i=0;i<str.length;i++){ hash = (hash*31 + str.charCodeAt(i)) >>> 0; }
  return hash.toString(36).toUpperCase().padStart(7,'0').slice(-6);
}

let currentBucket = null;
let qr = null;

function render(){
  const now = Date.now();
  const bucket = bucketFor(now);
  if(bucket !== currentBucket){
    currentBucket = bucket;
    const code = makeCode(bucket, SECRET);
    document.getElementById('code-label').textContent = code;
    const url = `${ABSEN_URL}?code=${code}`;
    const el = document.getElementById('qrcode');
    el.innerHTML = '';
    new QRCode(el, { text: url, width: 260, height: 260, colorDark:"#1F3A34", colorLight:"#ffffff" });
  }
  const msLeft = BUCKET_MS - (now % BUCKET_MS);
  const s = Math.floor(msLeft/1000);
  const mm = String(Math.floor(s/60)).padStart(2,'0');
  const ss = String(s%60).padStart(2,'0');
  document.getElementById('timer').textContent = `Berganti dalam ${mm}:${ss}`;
}

render();
setInterval(render, 1000);
</script>
</body>
</html>
